name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
    
    - name: Install dependencies
      run: npm install  # This will generate a fresh lock file
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium msedge
    
    - name: Wait for GitHub Pages deployment
      run: |
        echo "Waiting 30 seconds for GitHub Pages to deploy..."
        sleep 30
    
    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: https://willxxx7.github.io/TUCK-Clothes/
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
